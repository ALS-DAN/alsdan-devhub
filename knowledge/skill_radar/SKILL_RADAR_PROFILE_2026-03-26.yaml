developer: "Niels Postma"
date: "2026-03-26"
assessment_method: "developer self-assessment, eerlijk afgezet tegen professionele standaard"

# CONTEXT: Niels is geen software developer van achtergrond. Hij bouwt dit
# systeem met Claude als uitvoerder. Levels reflecteren wat Niels ZELFSTANDIG
# kan, afgezet tegen wat een professional in dat domein kan. Het systeem
# presteert hoger dan de individuele levels suggereren — dat is de kracht
# van de mens+AI samenwerking, niet van Niels als solo-developer.

domains:
  - name: "AI-Engineering"
    level: 2  # Advanced Beginner — kan Claude aansturen en resultaat beoordelen, begrijpt niet waarom iets technisch werkt
    subdomains:
      - "Claude aansturen"
      - "RAG conceptueel begrip"
      - "Prompt formuleren"
