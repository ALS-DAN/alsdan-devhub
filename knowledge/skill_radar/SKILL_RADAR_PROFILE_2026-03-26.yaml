    growth_velocity: 0.1
    zpd_tasks:
      - "Uitleggen waarom het systeem 3 lagen heeft"
      - "Een architectuurbeslissing documenteren in eigen woorden"

  - name: "DevOps/Tooling"
    level: 2  # Advanced Beginner — kan tools bedienen, niet configureren of troubleshooten
    subdomains:
