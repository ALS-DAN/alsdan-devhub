      - "Ongetest zonder AI-partner"
      - "Ongetest met een team of in productie-omgeving"
      - "Eén project, korte intensieve sessies"
    growth_velocity: 0.2
    zpd_tasks:
      - "Governance framework toetsen aan bestaande standaarden"
      - "Zelf een compliance-check uitvoeren zonder tooling"
      - "Framework testen met een tweede project"

  - name: "Testing"
    level: 1  # Novice — weet dat tests nodig zijn, kan ze niet schrijven of echt lezen
    subdomains:
