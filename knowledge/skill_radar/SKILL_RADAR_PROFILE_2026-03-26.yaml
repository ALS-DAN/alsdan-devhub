      - "Kan richting bepalen en resultaat beoordelen"
      - "Begrijpt niet waarom agent-architectuur technisch werkt"
      - "Afhankelijk van Claude voor alle implementatie"
    growth_velocity: 0.2
    zpd_tasks:
      - "Begrijpen wat een agent-loop doet op technisch niveau"
      - "Zelfstandig beoordelen of agent-output correct is"
      - "Een prompt debuggen wanneer het resultaat niet klopt"

  - name: "Python"
    level: 1  # Novice — kan code niet zelfstandig schrijven of debuggen
    subdomains:
