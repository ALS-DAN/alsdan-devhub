    growth_velocity: 0.1
    zpd_tasks:
      - "Een bestaande test lezen en in eigen woorden uitleggen"
      - "Herkennen wanneer een scenario niet getest is"

  - name: "Security"
    level: 1  # Novice — weet dat het belangrijk is, geen praktische kennis
    subdomains:
      - "Bewustzijn"
    evidence:
      - "Weet dat secrets niet in code mogen"
      - "Geen kennis van OWASP op practisch niveau"
      - "Red team agent volledig door Claude gebouwd"
    growth_velocity: 0.1
    zpd_tasks:
      - "OWASP Top 10 op conceptueel niveau begrijpen"
      - "Herkennen wanneer iets een security-risico is"

  - name: "Architecture"
    level: 2  # Advanced Beginner — kan op systeemniveau meedenken, maar concepten (adapter, ABC) zijn door Claude voorgesteld
    subdomains:
      - "Systeemdenken"
      - "Lagen onderscheiden"
    evidence:
      - "Kan meedenken over structuur"
