      - "Kan niet zelfstandig troubleshooten bij fouten"
      - "Geen CI/CD kennis"
    growth_velocity: 0.1
    zpd_tasks:
      - "Begrijpen wat git branches zijn en waarom"
      - "Een docker-compose.yml lezen"

  - name: "Methodiek"
    level: 2  # Advanced Beginner — heeft Shape Up geleerd en toegepast, maar in context van korte AI-sessies, niet bewezen met team of langere cycli
    subdomains:
