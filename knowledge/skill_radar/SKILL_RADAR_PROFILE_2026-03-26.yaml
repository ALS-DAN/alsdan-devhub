    growth_velocity: 0.1
    zpd_tasks:
      - "Methodiek toepassen over langere cycli (weken, niet uren)"
      - "Retrospective-inzichten zelf vertalen naar concrete acties"
      - "Velocity-data interpreteren en voorspellingen doen"

