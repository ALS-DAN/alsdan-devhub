[project]
name = "devhub-vectorstore"
version = "0.2.0"
description = "Vector store interface and adapters for DevHub (Weaviate, ChromaDB)"
requires-python = ">=3.11"
dependencies = [
    "devhub-core",
]

[project.optional-dependencies]
chromadb = ["chromadb>=0.5"]
weaviate = ["weaviate-client>=4.0,<5.0"]
embeddings = ["sentence-transformers>=2.0"]
dev = ["chromadb>=0.5", "weaviate-client>=4.0,<5.0", "sentence-transformers>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
devhub-core = { workspace = true }
