[project]
name = "devhub-storage"
version = "0.2.0"
description = "Storage interface and adapters for DevHub (Google Drive, SharePoint, local)"
requires-python = ">=3.11"
dependencies = [
    "devhub-core",
]

[project.optional-dependencies]
google = [
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "google-auth-oauthlib>=1.0",
]
test = ["hypothesis>=6.0"]
dev = [
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "google-auth-oauthlib>=1.0",
    "hypothesis>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
devhub-core = { workspace = true }
