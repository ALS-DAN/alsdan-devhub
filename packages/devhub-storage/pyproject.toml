[project]
name = "devhub-storage"
version = "0.2.0"
description = "Storage interface and adapters for DevHub (Google Drive, SharePoint, local)"
requires-python = ">=3.11"
dependencies = [
    "devhub-core",
]

[project.optional-dependencies]
test = ["hypothesis>=6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
devhub-core = { workspace = true }
