name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest ruff pip-audit pyyaml

      # в”Ђв”Ђ Checks (continue-on-error zodat alle checks draaien) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          set +e
          output=$(pytest --tb=short -q 2>&1)
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          # Sla summary op (laatste regel)
          summary=$(echo "$output" | tail -1)
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run ruff
        id: ruff
        continue-on-error: true
        run: |
          set +e
          output=$(ruff check . --output-format=json 2>/dev/null)
          exit_code=$?
          count=$(echo "$output" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "error_count=$count" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          set +e
          output=$(pip-audit --format=json 2>/dev/null)
          exit_code=$?
          cve_count=$(echo "$output" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              vulns = data.get('dependencies', [])
              print(sum(len(d.get('vulns', [])) for d in vulns))
          except:
              print(0)
          " 2>/dev/null || echo "0")
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "cve_count=$cve_count" >> "$GITHUB_OUTPUT"
          exit 0

      # в”Ђв”Ђ Verdict bepaling в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

      - name: Determine verdict
        id: verdict
        run: |
          pytest_exit="${{ steps.pytest.outputs.exit_code }}"
          ruff_errors="${{ steps.ruff.outputs.error_count }}"
          cve_count="${{ steps.pip_audit.outputs.cve_count }}"

          severity="GREEN"
          if [ "$pytest_exit" != "0" ] || [ "$cve_count" != "0" ]; then
            severity="RED"
          elif [ "$ruff_errors" != "0" ]; then
            severity="YELLOW"
          fi

          echo "severity=$severity" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ PR Comment в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

      - name: Build comment body
        id: comment
        run: |
          pytest_status="PASS"
          [ "${{ steps.pytest.outputs.exit_code }}" != "0" ] && pytest_status="FAIL"

          ruff_status="PASS"
          [ "${{ steps.ruff.outputs.error_count }}" != "0" ] && ruff_status="FAIL"

          audit_status="PASS"
          [ "${{ steps.pip_audit.outputs.cve_count }}" != "0" ] && audit_status="FAIL"

          severity="${{ steps.verdict.outputs.severity }}"

          # Emoji per severity
          case "$severity" in
            GREEN)  badge="рџџў" ;;
            YELLOW) badge="рџџЎ" ;;
            RED)    badge="рџ”ґ" ;;
          esac

          body="<!-- n8n-quality-gate -->
          ## $badge DevHub Quality Gate

          | Check | Status | Details |
          |-------|--------|---------|
          | Tests | $pytest_status | ${{ steps.pytest.outputs.summary }} |
          | Lint (ruff) | $ruff_status | ${{ steps.ruff.outputs.error_count }} errors |
          | Security (pip-audit) | $audit_status | ${{ steps.pip_audit.outputs.cve_count }} vulnerabilities |

          **Verdict: $severity**

          ---
          _Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ) | Automated by DevHub CI/CD_"

          # Multi-line output
          {
            echo "body<<GHEOF"
            echo "$body"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- n8n-quality-gate -->'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment.outputs.body }}
          edit-mode: replace

      # в”Ђв”Ђ Labels в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

      - name: Manage quality labels
        uses: actions/github-script@v7
        with:
          script: |
            const severity = '${{ steps.verdict.outputs.severity }}';
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Verwijder oude quality labels
            const oldLabels = ['quality:green', 'quality:yellow', 'quality:red'];
            const currentLabels = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });

            for (const label of currentLabels.data) {
              if (oldLabels.includes(label.name)) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label.name
                });
              }
            }

            // Maak label aan als het niet bestaat
            const newLabel = `quality:${severity.toLowerCase()}`;
            try {
              await github.rest.issues.getLabel({ owner, repo, name: newLabel });
            } catch {
              const colors = { 'quality:green': '0e8a16', 'quality:yellow': 'fbca04', 'quality:red': 'cb2431' };
              await github.rest.issues.createLabel({
                owner, repo, name: newLabel, color: colors[newLabel] || 'ededed'
              });
            }

            // Voeg nieuw label toe
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels: [newLabel]
            });
