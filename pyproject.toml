[tool.uv.workspace]
members = [
    "packages/devhub-core",
    "packages/devhub-storage",
    "packages/devhub-vectorstore",
    "packages/devhub-documents",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "hypothesis>=6.0",
    "chromadb>=1.5.5",
]

[tool.pytest.ini_options]
testpaths = ["packages/devhub-core/tests", "packages/devhub-storage/tests", "packages/devhub-vectorstore/tests", "packages/devhub-documents/tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
