documents:
  default_format: markdown
  adapters:
    markdown:
      enabled: true
    odf:
      enabled: true
      requires: odfpy
  output_dir: "output/documents"
  storage:
    backend: drive_sync
    node_drive_root_key: drive_root  # per-node drive_root uit nodes sectie

taxonomy:
  layers:
    product:
      categories: [tutorial, howto, reference, explanation]
      description: "Diátaxis standaard — productdocumentatie"
    process:
      categories: [pattern, analysis, decision, retrospective]
      description: "Procesgericht — ontwikkelproces documentatie"
    knowledge:
      categories: [methodology, best_practice, sota_review, playbook]
      description: "Kennisbank — expert knowledge base"

nodes:
  devhub:
    taxonomy:
      - tutorial
      - howto
      - reference
      - explanation
      - pattern
      - analysis
      - decision
      - retrospective
      - methodology
      - best_practice
      - sota_review
      - playbook
    drive_root: "DevHub"
    folder_map:
      product: "product"
      process: "process"
      knowledge: "knowledge"
  boris-buurts:
    taxonomy:
      - tutorial
      - howto
      - reference
      - explanation
      - pattern
      - decision
    drive_root: "BORIS"
    folder_map:
      product: "product"
      process: "process"
      knowledge: "knowledge"
