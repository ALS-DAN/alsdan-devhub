# Kennispipeline configuratie — KWP DEV
# Research Compas: drie-ringen domeinstructuur (Sprint 33)
knowledge:
  rings:
    core:
      description: "Altijd actief, alle agents"
      auto_bootstrap: true
    agent:
      description: "Geactiveerd per agent-profiel"
      auto_bootstrap: false
    project:
      description: "Node-specifiek, geactiveerd via nodes.yml"
      auto_bootstrap: false

  domains:
    # --- Ring 1: Core (5) ---
    ai_engineering:
      ring: core
      freshness_months: 3
      rq_focus: [RQ1, RQ4, RQ5]
      related_domains: [claude_specific, python_architecture]
      bootstrap_priority: 1
      description: "Prompt engineering, agent architectuur, RAG, context management"
      seed_questions:
        - question: "Wat zijn de huidige SOTA prompt engineering technieken en anti-patronen?"
          rq_tag: RQ1
        - question: "Welke multi-agent architectuur patronen zijn bewezen effectief?"
          rq_tag: RQ1
        - question: "Wat zijn de beste RAG chunking strategieën voor kennisbanken?"
          rq_tag: RQ4
        - question: "Wat zijn bewezen tool use patterns en best practices voor LLM agents?"
          rq_tag: RQ4
        - question: "Hoe optimaliseer je context window management bij grote codebases?"
          rq_tag: RQ5
        - question: "Welke agent memory patronen zijn er voor korte en lange termijn persistentie?"
          rq_tag: RQ5
    claude_specific:
      ring: core
      freshness_months: 1
      rq_focus: [RQ1, RQ4, RQ6]
      related_domains: [ai_engineering]
      bootstrap_priority: 1
      description: "Model capabilities, Claude Code, MCP, plugin-architectuur"
      monitored_sources:
        - "https://docs.anthropic.com/en/docs/changelog"
        - "https://docs.anthropic.com/en/docs/agents-and-tools/claude-code"
      seed_questions:
        - question: "Wat zijn de actuele capabilities en beperkingen van Claude modellen?"
          rq_tag: RQ1
        - question: "Wat zijn bewezen Claude Code best practices en workflow patronen?"
          rq_tag: RQ1
        - question: "Hoe werkt het MCP protocol en wat zijn security best practices?"
          rq_tag: RQ4
        - question: "Wat is de optimale structuur voor Claude Code plugins?"
          rq_tag: RQ4
        - question: "Hoe ontwerp je effectieve system prompts voor complexe agent-taken?"
          rq_tag: RQ6
        - question: "Wat zijn de trade-offs tussen Claude modellen voor agent-taken?"
          rq_tag: RQ6
    python_architecture:
      ring: core
      freshness_months: 12
      rq_focus: [RQ2, RQ4, RQ5]
      related_domains: [ai_engineering, testing_qa]
      bootstrap_priority: 2
      description: "Design patterns, uv, Pydantic v2, testing"
      seed_questions:
        - question: "Wanneer gebruik je ABC + frozen dataclass vs. Protocol + TypedDict?"
          rq_tag: RQ2
        - question: "Wat zijn best practices voor uv workspace monorepo management?"
          rq_tag: RQ2
        - question: "Wat zijn moderne pytest patronen: fixture design en parametrize?"
          rq_tag: RQ4
        - question: "Pydantic v2 vs. frozen dataclasses: wanneer welke?"
          rq_tag: RQ4
        - question: "Welke factory pattern varianten zijn er in Python?"
          rq_tag: RQ5
        - question: "Hoe ontwerp je een effectieve adapter/interface laag?"
          rq_tag: RQ5
    development_methodology:
      ring: core
      freshness_months: 12
      rq_focus: [RQ4, RQ5, RQ6]
      related_domains: [sprint_planning, product_ownership]
      bootstrap_priority: 2
      description: "Shape Up, Cynefin, DORA metrics, trunk-based development"
      seed_questions:
        - question: "Hoe pas je Shape Up toe in solo/klein team development?"
          rq_tag: RQ4
        - question: "Hoe gebruik je het Cynefin framework voor technische beslissingen?"
          rq_tag: RQ4
        - question: "Hoe implementeer je DORA metrics in een solo developer context?"
          rq_tag: RQ5
        - question: "Trunk-based development vs. feature branches voor AI-assisted development?"
          rq_tag: RQ5
        - question: "Hoe combineer je iteratieve planning met governance vereisten?"
          rq_tag: RQ6
        - question: "Wat zijn bewezen sprint retrospective patronen voor continuous improvement?"
          rq_tag: RQ6
    governance_compliance:
      ring: core
      freshness_months: 6
      rq_focus: [RQ5, RQ6]
      related_domains: [security_appsec, development_methodology]
      bootstrap_priority: 3
      description: "DEV_CONSTITUTION, ADR governance, audit compliance, impact-zonering"
      seed_questions:
        - question: "Wat zijn best practices voor ADR governance in software projecten?"
          rq_tag: RQ5
        - question: "Hoe ontwerp je effectieve impact-zonering voor AI agents?"
          rq_tag: RQ5
        - question: "Welke compliance frameworks zijn relevant voor AI development systemen?"
          rq_tag: RQ6
        - question: "Hoe implementeer je audit trails voor AI-gegenereerde code?"
          rq_tag: RQ6
        - question: "Wat zijn bewezen patronen voor human-in-the-loop governance?"
          rq_tag: RQ5
        - question: "Hoe balanceer je autonomie en controle in AI-assisted development?"
          rq_tag: RQ6

    # --- Ring 2: Agent-specifiek (8) ---
    sprint_planning:
      ring: agent
      freshness_months: 6
      rq_focus: [RQ4, RQ5, RQ6]
      related_domains: [development_methodology, product_ownership]
      bootstrap_priority: 2
      description: "Sprint lifecycle, Shape Up appetite, DoR/DoD, velocity tracking"
    code_review:
      ring: agent
      freshness_months: 6
      rq_focus: [RQ1, RQ4]
      related_domains: [python_architecture, testing_qa, security_appsec]
      bootstrap_priority: 2
      description: "Review checklists, anti-patronen, code quality metrics"
    security_appsec:
      ring: agent
      freshness_months: 3
      rq_focus: [RQ1, RQ4, RQ6]
      related_domains: [governance_compliance, code_review]
      bootstrap_priority: 2
      description: "OWASP ASI 2026, dependency scanning, secrets management"
    testing_qa:
      ring: agent
      freshness_months: 6
      rq_focus: [RQ2, RQ4]
      related_domains: [python_architecture, code_review]
      bootstrap_priority: 2
      description: "Test strategie, pytest patterns, coverage, property-based testing"
    knowledge_methodology:
      ring: agent
      freshness_months: 12
      rq_focus: [RQ1, RQ5]
      related_domains: [ai_engineering, documentation]
      bootstrap_priority: 3
      description: "RAG pipelines, curation, knowledge grading, Research Questions"
    coaching_learning:
      ring: agent
      freshness_months: 12
      rq_focus: [RQ3, RQ4, RQ5]
      related_domains: [knowledge_methodology, development_methodology]
      bootstrap_priority: 3
      description: "Dreyfus model, ZPD, threshold concepts, O-B-B coaching"
    documentation:
      ring: agent
      freshness_months: 12
      rq_focus: [RQ2, RQ3]
      related_domains: [knowledge_methodology, coaching_learning]
      bootstrap_priority: 3
      description: "Diataxis framework, MkDocs, API docs, knowledge articles"
    product_ownership:
      ring: agent
      freshness_months: 6
      rq_focus: [RQ4, RQ5, RQ6]
      related_domains: [sprint_planning, development_methodology]
      bootstrap_priority: 3
      description: "Backlog management, stakeholder alignment, roadmap planning"

    # --- Ring 3: Project-specifiek (3) ---
    healthcare_ict:
      ring: project
      freshness_months: 6
      rq_focus: [RQ1, RQ4, RQ6]
      related_domains: [privacy_avg, governance_compliance]
      bootstrap_priority: 0
      description: "HL7 FHIR, NEN-normen, zorginformatiesystemen, interoperabiliteit"
      node_scope: boris-buurts
    privacy_avg:
      ring: project
      freshness_months: 3
      rq_focus: [RQ4, RQ5, RQ6]
      related_domains: [healthcare_ict, governance_compliance, security_appsec]
      bootstrap_priority: 0
      description: "GDPR/AVG, DPIA, verwerkersovereenkomsten, dataminimalisatie"
      node_scope: boris-buurts
    multi_tenancy:
      ring: project
      freshness_months: 12
      rq_focus: [RQ2, RQ4, RQ6]
      related_domains: [python_architecture, security_appsec]
      bootstrap_priority: 0
      description: "Tenant isolation, data partitioning, configuratie-scheiding"
      node_scope: boris-buurts

  health:
    max_speculative_pct: 60
    max_stale_pct: 20
    max_single_source_pct: 70
  grading:
    gold_min_verification_pct: 80
    silver_min_verification_pct: 50
